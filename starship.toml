format = """
[ ](bg:9 fg:0)\
$os\
$username\
[Óāį](bg:17 fg:9)\
$directory\
[Óāį](fg:17 bg:18)\
$git_branch\
$git_status\
[Óāį](fg:18 bg:19)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$ruby\
$scala\
[Óāį](fg:19 bg:20)\
$docker_context\
[Óāį](fg:20 bg:21)\
$time\
[Óāį ](fg:21)\
"""

command_timeout = 5000

# You can also replace your username with a neat symbol like ÔĄ†  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:9"
style_root = "bg:9"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:16"
disabled = true # Disabled by default

[directory]
style = "bg:17"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "Ôúė "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ÔúėÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important Ôúė " = " ÔúėÔĄ™ "

[c]
symbol = "Óėě"
style = "bg:19 fg:white"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "ÔĆą"
style = "bg:20"
format = '[ $symbol $context ]($style) $path'

